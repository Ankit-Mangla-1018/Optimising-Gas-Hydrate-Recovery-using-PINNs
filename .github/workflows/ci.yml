name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nbqa flake8 nbconvert ipykernel

      - name: Lint source modules
        run: |
          flake8 src/ --max-line-length=120 --ignore=E501,W503

      - name: Lint notebook
        run: |
          nbqa flake8 notebooks/Final_PGNN.ipynb --max-line-length=120 --ignore=E501,W503,E402

      - name: Smoke-test Chen-Guo & PR EOS imports
        run: |
          python -c "
          from src.peng_robinson_eos import calculate_fugacity_pr
          f = calculate_fugacity_pr(T=280.0, P=5e6, Tc=190.56, Pc=4.599e6, omega=0.011)
          assert f > 0, 'Fugacity must be positive'
          print(f'PR EOS fugacity at 280K, 5MPa: {f/1e6:.4f} MPa  ✓')
          "

      - name: Smoke-test synthetic data generation
        run: |
          python -c "
          from src.data_utils import synthetic_equilibrium_data
          df = synthetic_equilibrium_data(n_points=50)
          assert len(df) == 50
          assert 'T_K' in df.columns and 'P_Pa' in df.columns
          print('Synthetic data generation: 50 rows  ✓')
          "
